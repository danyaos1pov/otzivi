<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberBlue Pro | Stars Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --accent: #00d2ff;
            --accent-glow: #3a7bd5;
            --admin-red: #ff4d4d;
            --success-green: #2ecc71;
            --text: #ffffff;
            --text-dim: #8b949e;
            --glass-border: rgba(0, 210, 255, 0.15);
            --star-color: #fbbf24;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            min-height: 100vh; padding-bottom: 120px; overflow-x: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        
        .mesh-gradient { position: fixed; inset: 0; background: radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.12) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(58, 123, 213, 0.1) 0, transparent 50%); z-index: -1; }
        .container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
        
        .hero h1 { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 2rem; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        .hero h1 span { background: linear-gradient(90deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-card h2 { font-family: 'Unbounded'; font-size: 1.8rem; color: var(--accent); line-height: 1; margin-bottom: 5px; }
        .stat-card p { text-transform: uppercase; font-size: 0.6rem; font-weight: 700; color: var(--text-dim); }

        .reviews-grid { display: flex; flex-direction: column; gap: 20px; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--glass-border); 
            padding: 30px; border-radius: 30px; position: relative; 
            animation: slideUp 0.4s ease-out both;
        }
        
        /* ЗВЕЗДЫ В СПИСКЕ */
        .stars-row { color: var(--star-color); margin-bottom: 12px; font-size: 1.1rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .review-text { font-size: 1rem; line-height: 1.5; color: #cbd5e1; margin-bottom: 15px; word-wrap: break-word; }

        .user-meta { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); display: grid; place-items: center; font-family: 'Unbounded'; font-weight: 700; font-size: 0.7rem; color: #000; }
        .username { font-weight: 700; color: #fff; font-size: 0.9rem; }

        .toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            padding: 16px 30px; border-radius: 50px; font-weight: 500; font-size: 0.9rem; 
            z-index: 9999; display: none; justify-content: center; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap; min-width: 250px; pointer-events: none;
        }
        .toast.show { display: flex; animation: fadeIn 0.3s; }
        .toast.error { background: var(--admin-red); color: white; }
        .toast.success { background: var(--success-green); color: white; }

        .fab { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--accent); color: #000 !important;
            padding: 18px 36px; border-radius: 100px; border: none; 
            font-family: 'Unbounded'; font-weight: 400; font-size: 0.8rem; 
            cursor: pointer; box-shadow: 0 10px 30px rgba(0, 210, 255, 0.3); 
            z-index: 100; touch-action: manipulation;
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); padding: 20px; }
        .modal { background: #0d1117; width: 100%; max-width: 400px; padding: 30px; border-radius: 35px; border: 1px solid var(--glass-border); }
        
        /* ОБНОВЛЕННЫЙ ВЫБОР ЗВЕЗД */
        .star-selection-area { text-align: center; margin-bottom: 25px; }
        .rating-num { font-family: 'Unbounded'; font-size: 1.2rem; color: var(--accent); margin-bottom: 10px; display: block; }
        .star-picker { display: flex; gap: 5px; justify-content: center; touch-action: manipulation; }
        .star-picker span { 
            font-size: 2.8rem; /* Увеличен размер */
            cursor: pointer; 
            color: #1e293b; 
            transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 0 5px; /* Расширена зона нажатия */
        }
        .star-picker span.active { color: var(--star-color); text-shadow: 0 0 15px rgba(251, 191, 36, 0.4); transform: scale(1.1); }

        input, textarea { 
            width: 100%; background: #161b22; border: 1px solid #30363d; 
            padding: 16px; border-radius: 15px; color: #fff; 
            margin-bottom: 15px; outline: none; font-family: 'Inter'; font-size: 16px;
        }
        
        .submit-btn { 
            width: 100%; padding: 18px; border-radius: 15px; 
            background: var(--accent); border: none; color: #000 !important;
            font-family: 'Unbounded'; font-weight: 400; cursor: pointer; touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>
    <div class="mesh-gradient"></div>

    <div class="container">
        <header class="hero">
            <h1>ON1X VPN<span> Отзывы</span></h1>
        </header>
        <div class="stats-container">
            <div class="stat-card"><h2 id="avgRating">0.0</h2><p>Рейтинг</p></div>
            <div class="stat-card"><h2 id="totalCount">0</h2><p>Отзывов</p></div>
        </div>
        <div class="reviews-grid" id="grid"></div>
    </div>

    <button class="fab" id="addBtn">Оставить отзыв</button>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <h2 style="font-family: 'Unbounded'; text-align: center; margin-bottom: 15px; font-size: 1rem; font-weight: 400;">ВАША ОЦЕНКА</h2>
            
            <div class="star-selection-area">
                <span class="rating-num" id="ratingDisplay">5 / 5</span>
                <div class="star-picker" id="starPicker">
                    <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                </div>
            </div>

            <input type="text" id="nameInp" placeholder="Ваше имя" autocomplete="off">
            <textarea id="msgInp" rows="4" placeholder="Ваш отзыв..."></textarea>
            <button class="submit-btn" id="saveBtn">Опубликовать</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const grid = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const toast = document.getElementById('toast');
        const ratingDisplay = document.getElementById('ratingDisplay');
        let currentStars = 5;

        function showNotification(text, type) {
            toast.textContent = text;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.getElementById('addBtn').addEventListener('pointerdown', () => { overlay.style.display = 'flex'; });
        overlay.addEventListener('pointerdown', (e) => { if(e.target === overlay) overlay.style.display = 'none'; });

        const pickerStars = document.querySelectorAll('#starPicker span');
        pickerStars.forEach(s => {
            s.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                currentStars = parseInt(s.dataset.v);
                updatePicker();
            });
        });

        function updatePicker() {
            pickerStars.forEach(s => s.classList.toggle('active', s.dataset.v <= currentStars));
            ratingDisplay.innerText = `${currentStars} / 5`;
        }
        updatePicker();

        async function fetchReviews() {
            let { data: reviews, error } = await supabaseClient
                .from('reviews')
                .select('*')
                .in('proverka', [1, 2]) 
                .order('created_at', { ascending: false });
            if (!error) render(reviews);
        }

        function render(data) {
            grid.innerHTML = data.map((r, i) => `
                <div class="card" style="animation-delay: ${i * 0.05}s">
                    <div class="stars-row">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
                    <p class="review-text">${r.msg}</p>
                    <div class="user-meta">
                        <div class="avatar">${r.name ? r.name[0].toUpperCase() : '?'}</div>
                        <div class="username">${r.name}</div>
                    </div>
                </div>
            `).join('');
            updateStats(data);
        }

        function updateStats(data) {
            const rOnly = data.filter(r => r.proverka === 1);
            const avg = rOnly.length > 0 ? (rOnly.reduce((s, r) => s + r.stars, 0) / rOnly.length).toFixed(1) : "0.0";
            document.getElementById('avgRating').innerText = avg;
            document.getElementById('totalCount').innerText = data.length;
        }

        document.getElementById('saveBtn').addEventListener('pointerdown', async () => {
            const name = document.getElementById('nameInp').value.trim();
            const msg = document.getElementById('msgInp').value.trim();
            if(!name || !msg) { showNotification("Заполните все поля", "error"); return; }

            const { error } = await supabaseClient.from('reviews').insert([{ name, msg, stars: currentStars, proverka: 0 }]);
            if (!error) {
                overlay.style.display = 'none';
                document.getElementById('nameInp').value = '';
                document.getElementById('msgInp').value = '';
                showNotification("Отправлено на модерацию", "success");
            } else {
                showNotification("Ошибка сервера", "error");
            }
        });

        fetchReviews();
    </script>
</body>
</html>
