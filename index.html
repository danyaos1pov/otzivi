<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN | Отзывы</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --accent: #00d2ff;
            --accent-glow: #3a7bd5;
            --admin-red: #ff4d4d;
            --success-green: #2ecc71;
            --text: #ffffff;
            --text-dim: #8b949e;
            --glass-border: rgba(0, 210, 255, 0.15);
            --star-color: #fbbf24;
        }

        /* Защита от копирования */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        input, textarea {
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        .mesh-gradient { position: fixed; inset: 0; background: radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.12) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(58, 123, 213, 0.1) 0, transparent 50%); z-index: -1; }
        .container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
        
        .hero h1 { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 2rem; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        .hero h1 span { background: linear-gradient(90deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(0, 210, 255, 0.05); }
        .stat-card h2 { font-family: 'Unbounded'; font-size: 1.8rem; color: var(--accent); line-height: 1; margin-bottom: 5px; }
        .stat-card p { text-transform: uppercase; font-size: 0.6rem; font-weight: 700; color: var(--text-dim); }

        .cta-block {
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.05), rgba(58, 123, 213, 0.05));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
            animation: slideUp 0.5s ease-out;
        }
        .cta-block p { font-size: 0.95rem; color: #cbd5e1; margin-bottom: 20px; line-height: 1.4; }
        .cta-btn {
            background: var(--accent);
            color: #000 !important;
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-family: 'Unbounded';
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cta-btn:hover { background: #fff; transform: scale(1.03); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .cta-btn:active { transform: scale(0.98); }

        .reviews-grid { display: flex; flex-direction: column; gap: 20px; }
        .card { 
            background: var(--card-bg);
            border: 1px solid var(--glass-border); 
            padding: 30px; border-radius: 30px; position: relative; 
            animation: slideUp 0.4s ease-out both;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { border-color: rgba(0, 210, 255, 0.4); transform: translateY(-3px); background: rgba(13, 17, 23, 0.8); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .card::before { content: "“"; position: absolute; top: -10px; right: 15px; font-family: 'Unbounded'; font-size: 7rem; color: var(--accent); opacity: 0.1; line-height: 1; pointer-events: none; }
        
        .stars-row { color: var(--star-color); margin-bottom: 12px; font-size: 1.1rem; letter-spacing: 2px; position: relative; z-index: 1; }
        .review-text { font-size: 1rem; line-height: 1.5; color: #cbd5e1; margin-bottom: 15px; word-wrap: break-word; position: relative; z-index: 1; }

        .read-more-btn { background: none; border: none; color: var(--accent); font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer; padding: 0; margin-top: -10px; margin-bottom: 15px; display: block; text-decoration: underline; touch-action: manipulation; position: relative; z-index: 2; transition: 0.2s; }
        .read-more-btn:hover { color: #fff; }

        .user-meta { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
        .avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); display: grid; place-items: center; font-family: 'Unbounded'; font-weight: 700; font-size: 0.7rem; color: #000; }
        .username { font-weight: 700; color: #fff; font-size: 0.9rem; display: flex; flex-direction: column; }
        .review-date { font-size: 0.7rem; color: var(--text-dim); font-weight: 400; margin-top: 2px; }

        .admin-reply { margin-top: 15px; padding: 15px; background: rgba(255, 77, 77, 0.05); border-left: 3px solid var(--admin-red); border-radius: 0 15px 15px 0; position: relative; z-index: 1; }
        .admin-tag { font-family: 'Unbounded'; font-size: 0.55rem; color: var(--admin-red); text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: 700; }
        .admin-text { font-size: 0.9rem; color: #cbd5e1; line-height: 1.4; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 16px 30px; border-radius: 50px; font-weight: 500; font-size: 0.9rem; z-index: 9999; display: none; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap; min-width: 250px; pointer-events: none; }
        .toast.show { display: flex; animation: fadeIn 0.3s; }
        .toast.error { background: var(--admin-red); color: white; }
        .toast.success { background: var(--success-green); color: white; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); padding: 20px; }
        .modal { background: #0d1117; width: 100%; max-width: 400px; padding: 30px; border-radius: 35px; border: 1px solid var(--glass-border); position: relative; animation: slideUp 0.4s ease-out; }
        
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; color: var(--text-dim); cursor: pointer; transition: 0.3s; line-height: 1; }
        .close-modal:hover { color: var(--accent); transform: rotate(90deg); }

        .star-selection-area { text-align: center; margin-bottom: 25px; }
        .rating-num { font-family: 'Unbounded'; font-size: 1.2rem; color: var(--accent); margin-bottom: 10px; display: block; }
        .star-picker { display: flex; gap: 5px; justify-content: center; touch-action: manipulation; }
        .star-picker span { font-size: 2.8rem; cursor: pointer; color: #1e293b; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 0 5px; }
        .star-picker span.active { color: var(--star-color); transform: scale(1.1); }
        .star-picker span:hover { transform: scale(1.25); color: var(--star-color); }

        input, textarea { width: 100%; background: #161b22; border: 1px solid #30363d; padding: 16px; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; font-family: 'Inter'; font-size: 16px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); background: #1c2128; box-shadow: 0 0 10px rgba(0, 210, 255, 0.1); }
        .submit-btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--accent); border: none; color: #000 !important; font-family: 'Unbounded'; font-weight: 400; cursor: pointer; touch-action: manipulation; transition: 0.3s; }
        .submit-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>
    <div class="mesh-gradient"></div>

    <div class="container">
        <header class="hero">
            <h1>ON1X VPN<span> Отзывы</span></h1>
        </header>

        <div class="stats-container">
            <div class="stat-card"><h2 id="avgRating">0.0</h2><p>Рейтинг</p></div>
            <div class="stat-card"><h2 id="totalCount">0</h2><p>Отзывов</p></div>
        </div>

        <div class="cta-block">
            <p>Оставьте свой отзыв, который поможет нам стать лучше</p>
            <button class="cta-btn" id="addBtn">Оставить отзыв</button>
        </div>

        <div class="reviews-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <span class="close-modal" id="closeBtn">&times;</span>
            <h2 style="font-family: 'Unbounded'; text-align: center; margin-bottom: 15px; font-size: 1rem; font-weight: 400; color: #fff;">ВАША ОЦЕНКА</h2>
            <div class="star-selection-area">
                <span class="rating-num" id="ratingDisplay">5 / 5</span>
                <div class="star-picker" id="starPicker">
                    <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                </div>
            </div>
            <input type="text" id="nameInp" placeholder="Ваше имя" autocomplete="off">
            <input type="text" id="contactInp" placeholder="ID или @username (необязательно)" autocomplete="off">
            <textarea id="msgInp" rows="4" placeholder="Напишите ваш отзыв"></textarea>
            <button class="submit-btn" id="saveBtn">Опубликовать</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const grid = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');
        const toast = document.getElementById('toast');
        const ratingDisplay = document.getElementById('ratingDisplay');
        let currentStars = 5;

        // Защита
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80)) e.preventDefault();
            if (e.keyCode === 123) e.preventDefault();
        });

        function showNotification(text, type) {
            toast.textContent = text;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        window.expandText = (btn, id) => {
            const textEl = document.getElementById(`text-${id}`);
            textEl.innerText = btn.getAttribute('data-full');
            btn.remove();
        };

        const openModal = () => { overlay.style.display = 'flex'; };
        const closeModal = () => { overlay.style.display = 'none'; };

        document.getElementById('addBtn').addEventListener('pointerdown', openModal);
        closeBtn.addEventListener('pointerdown', closeModal);
        overlay.addEventListener('pointerdown', (e) => { if(e.target === overlay) closeModal(); });

        const pickerStars = document.querySelectorAll('#starPicker span');
        pickerStars.forEach(s => {
            s.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                currentStars = parseInt(s.dataset.v);
                updatePicker();
            });
        });

        function updatePicker() {
            pickerStars.forEach(s => s.classList.toggle('active', s.dataset.v <= currentStars));
            ratingDisplay.innerText = `${currentStars} / 5`;
        }
        updatePicker();

        // Загрузка из кэша для мгновенного отображения на мобильных
        const cached = localStorage.getItem('reviews_cache');
        if (cached) render(JSON.parse(cached));

        async function fetchReviews() {
            try {
                let { data: reviews, error } = await supabaseClient
                    .from('reviews')
                    .select('id, name, msg, stars, created_at, admin, proverka')
                    .in('proverka', [1, 2])
                    .order('created_at', { ascending: false });
                
                if (!error && reviews) {
                    localStorage.setItem('reviews_cache', JSON.stringify(reviews));
                    render(reviews);
                }
            } catch (e) { console.error(e); }
        }

        function render(data) {
            if (!data) return;
            grid.innerHTML = data.map((r, i) => {
                const isLong = r.msg.length > 200;
                const displayMsg = isLong ? r.msg.substring(0, 200) + '...' : r.msg;
                
                const dateObj = new Date(r.created_at);
                const day = String(dateObj.getDate()).padStart(2, '0');
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const year = dateObj.getFullYear();
                const fullDate = `${day}.${month}.${year}`;

                return `
                <div class="card" style="animation-delay: ${i * 0.05}s">
                    <div class="stars-row">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
                    <p class="review-text" id="text-${r.id}">${displayMsg}</p>
                    ${isLong ? `<button class="read-more-btn" data-full="${r.msg.replace(/"/g, '&quot;')}" onclick="expandText(this, '${r.id}')">Читать полностью</button>` : ''}
                    <div class="user-meta">
                        <div class="avatar">${r.name ? r.name[0].toUpperCase() : '?'}</div>
                        <div class="username">
                            <span>${r.name}</span>
                            <span class="review-date">${fullDate}</span>
                        </div>
                    </div>
                    ${r.admin ? `
                        <div class="admin-reply">
                            <span class="admin-tag">Ответ администратора</span>
                            <div class="admin-text">${r.admin}</div>
                        </div>
                    ` : ''}
                </div>`;
            }).join('');
            updateStats(data);
        }

        function updateStats(data) {
            const rOnly = data.filter(r => r.proverka === 1);
            const avg = rOnly.length > 0 ? (rOnly.reduce((s, r) => s + r.stars, 0) / rOnly.length).toFixed(1) : "0.0";
            document.getElementById('avgRating').innerText = avg;
            document.getElementById('totalCount').innerText = data.length;
        }

        document.getElementById('saveBtn').addEventListener('pointerdown', async () => {
            const name = document.getElementById('nameInp').value.trim();
            const contact = document.getElementById('contactInp').value.trim();
            const msg = document.getElementById('msgInp').value.trim();
            
            if(!name || !msg) { showNotification("Заполните все поля", "error"); return; }
            
            const { error } = await supabaseClient.from('reviews').insert([{ 
                name, 
                contact: contact || null, 
                msg, 
                stars: currentStars, 
                proverka: 0 
            }]);
      
            if (!error) {
                closeModal();
                document.getElementById('nameInp').value = '';
                document.getElementById('contactInp').value = '';
                document.getElementById('msgInp').value = '';
                showNotification("Отправлено на модерацию", "success");
            } else { showNotification("Ошибка сервера", "error"); }
        });

        fetchReviews();
    </script>
</body>
</html>
